# Method comparison: PPO vs Dreamer vs RecurrentPPO on the same maze + task.
#
# Simplest usecase. Single world, single task, no variations.  RecurrentPPO is
# slow + high variance, so we run only 1 seed for it. PPO and Dreamer get 3.
#
# Cardinality: 1 variation × 3 methods × varying seeds = 3 + 3 + 1 = 7 runs.
# Each run is 10 stages of 1M steps (BFS interleave).

agent_preset: sphereagent_2d_lidar
task_preset: volumetric_exploration_5000_collision_penalty
world_preset: maze_sectored_orthogonal

total_steps: 12_000_000
n_stages: 40
mode: dfs

methods:
  # - name: recurrent_ppo
  - name: dreamer
  # - name: ppo

seeds: 3
