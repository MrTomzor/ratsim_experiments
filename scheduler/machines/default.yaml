# Default machine config — CPU only.
#
# Used when no --machine flag is given and $RATSIM_SCHEDULER_MACHINE is unset.
# Adjust cpu_slot to control how many PPO subprocesses run in parallel here.
#
# To use a different config (e.g. on a GPU box):
#   python -m scheduler.scheduler run <batch> --machine gpu_example
#   # or
#   export RATSIM_SCHEDULER_MACHINE=gpu_example     # also accepts a full path
#   python -m scheduler.scheduler run <batch>

resources:
  cpu_slot: 2

method_profiles:
  ppo:
    needs:
      cpu_slot: 1
    args:
      method.device: cpu

  recurrent_ppo:
    needs:
      cpu_slot: 1
    args:
      method.device: cpu

  dreamer:
    needs:
      cpu_slot: 1
    args:
      method.jax.platform: cpu
